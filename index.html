function Preview({ children }) {
  const ref = useRef(null);
  const [sc, setSc] = useState(0.45);
  useEffect(() => {
    const calc = () => { if (ref.current) setSc(Math.min((ref.current.clientWidth - 8) / 794, 0.7)); };
    calc(); window.addEventListener("resize", calc); return () => window.removeEventListener("resize", calc);
  }, []);
  const scaledH = Math.floor(1123 * sc) + 16;
  return (
    <div ref={ref} style={{ flex: 1, overflow: "auto", background: "#f5f0ea", padding: "8px 4px", WebkitOverflowScrolling: "touch" }}>
      <div style={{ width: Math.floor(794 * sc), height: scaledH, margin: "0 auto", overflow: "hidden", borderRadius: 4, boxShadow: "0 4px 24px rgba(0,0,0,0.15)" }}>
        <div style={{ width: 794, height: 1123, transform: `scale(${sc})`, transformOrigin: "top right" }}>{children}</div>
      </div>
    </div>
  );
}

  const [cd, setCd] = useState("");

  const tog = useCallback((id) => { setSel(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; }); }, []);
  const uSvc = useCallback((i,f,v) => { setServices(p => p.map((s,x) => x===i ? {...s,[f]:v} : s)); }, []);
  const addC = useCallback((cat) => { if (!cn.trim()) return; const id="c_"+Date.now(); setCustoms(p=>[...p,{id,name:cn,desc:cd,category:cat}]); setSel(p=>new Set([...p,id])); setCn(""); setCd(""); setShowCF(null); }, [cn,cd]);
  const applyPreset = useCallback((type) => { const preset = PRESETS[type]; if (preset) setSel(new Set(preset)); }, []);

  const [pdfBusy, setPdfBusy] = useState(false);
  const handlePrint = useCallback(async () => {
    const el = document.getElementById("print-area");
    if (!el || !window.html2pdf) { alert("טוען... נסה שוב בעוד שנייה"); return; }
    setPdfBusy(true);
    // Show for capture
    el.style.position = "fixed";
    el.style.left = "0";
    el.style.top = "0";
    el.style.zIndex = "99999";
    el.style.background = "#fff";
    el.style.overflow = "visible";
    
    const name = clientName ? `הצעת_מחיר_${clientName.replace(/\s/g,"_")}` : "הצעת_מחיר_פסאו";
    const pages = el.children;
    let pdf = null;
    
    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true, letterRendering: true, width: 794, height: 1123, scrollY: 0 });
      const imgData = canvas.toDataURL("image/jpeg", 0.92);
      if (i === 0) {
        pdf = new jspdf.jsPDF({ unit: "px", format: [794, 1123], orientation: "portrait", hotfixes: ["px_scaling"] });
      } else {
        pdf.addPage([794, 1123], "portrait");
      }
      pdf.addImage(imgData, "JPEG", 0, 0, 794, 1123);
    }
    
    pdf.save(name + ".pdf");
    // Hide again
    el.style.position = "absolute";
    el.style.left = "-9999px";
    el.style.zIndex = "auto";
    setPdfBusy(false);
  }, [clientName]);

  const foodT = useMemo(() => (parseInt(guestCount)||0)*(parseInt(pricePerGuest)||0), [guestCount,pricePerGuest]);
  const svcT = useMemo(() => services.reduce((s,v)=>v.included?s:s+(parseInt(v.qty)||0)*(parseInt(v.price)||0),0), [services]);
  const tot = foodT + svcT;
  const totV = Math.round(tot * 1.18);

  const byCat = useMemo(() => {
    const r = {};
    for (const [cat,items] of Object.entries(MENU_DB)) {
      const s = [...items.filter(i=>sel.has(i.id)), ...customs.filter(c=>c.category===cat&&sel.has(c.id))];
      if (s.length > 0) r[cat] = s;
    }
    return r;
  }, [sel, customs]);

  const inp = { background: F.bg, border: `1px solid ${F.br}`, borderRadius: 6, padding: "9px 12px", fontFamily: FN.body, fontSize: 13, color: F.tx, direction: "rtl", outline: "none", width: "100%" };
  const lbl = { fontSize: 11, fontWeight: 500, color: F.dm, display: "block", marginBottom: 4 };
  const pages = ["תפריט", "תמחור", "תנאים"];

  return (
    <div style={{ fontFamily: FN.body, background: F.bg, color: F.tx, direction: "rtl", minHeight: "100vh" }}>
      <div id="app-ui" style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>
      <div style={{ display: "flex", background: F.sf, borderBottom: `1px solid ${F.br}`, position: "sticky", top: 0, zIndex: 20 }}>
        {["form","preview"].map(t => (
          <button key={t} onClick={()=>setTab(t)} style={{ flex: 1, padding: "14px 0", background: "none", border: "none", cursor: "pointer", fontFamily: FN.body, fontSize: 14, fontWeight: tab===t?700:400, color: tab===t?F.gold:F.dm, borderBottom: tab===t?`2px solid ${F.gold}`:"2px solid transparent" }}>
            {t==="form" ? "עריכה" : "תצוגה מקדימה"}
          </button>
        ))}
        <div style={{ padding: "8px 12px", display: "flex", alignItems: "center" }}>
          <span style={{ fontFamily: FN.brand, fontSize: 13, letterSpacing: 3, color: F.gold, direction: "ltr" }}>PASEO</span>
        </div>
      </div>

      {tab === "form" && (
        <div style={{ flex: 1, overflow: "auto", paddingBottom: 80 }}>
          <div style={{ padding: "20px 20px", borderBottom: `1px solid ${F.br}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: F.gold, marginBottom: 16 }}>פרטי האירוע</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div><label style={lbl}>שם הלקוח</label><input style={inp} value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="לדוגמה: אדידס ישראל" /></div>
              <div><label style={lbl}>סוג אירוע</label>
                <select style={inp} value={eventType} onChange={e=>setEventType(e.target.value)}>
                  <option value="">בחר סוג אירוע</option>
                  {["הצעת נישואין","חתונה","יום הולדת","הרמת כוסית","חינה","בר/בת מצווה","אירוע חברה","השקה","אחר"].map(v=><option key={v} value={v}>{v}</option>)}
                </select>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><label style={lbl}>תאריך</label><input type="date" style={inp} value={eventDate} onChange={e=>setEventDate(e.target.value)} /></div>
                <div><label style={lbl}>שעות</label><input style={inp} value={eventTime} onChange={e=>setEventTime(e.target.value)} placeholder="12:00-16:00" /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><label style={lbl}>אורחים</label><input type="number" style={inp} value={guestCount} onChange={e=>setGuestCount(e.target.value)} /></div>
                <div><label style={lbl}>מחיר למנה ₪</label><input type="number" style={inp} value={pricePerGuest} onChange={e=>setPricePerGuest(e.target.value)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><label style={lbl}>סוג תפריט</label>
                  <select style={inp} value={menuType} onChange={e=>{const v=e.target.value;setMenuType(v);setMenuTitle(`תפריט ${v}`);applyPreset(v);}}>
                    {["בשרי","חלבי","חלבי-פרימיום","אומינו כשר"].map(v=><option key={v} value={v}>{v}</option>)}
                  </select>
                </div>
                <div><label style={lbl}>תוקף (ימים)</label><input type="number" style={inp} value={validDays} onChange={e=>setValidDays(e.target.value)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><label style={lbl}>תוספת פרימיום ₪</label><input type="number" style={inp} value={supplementPrice} onChange={e=>setSupplementPrice(e.target.value)} /></div>
                <div><label style={lbl}>שדרוג קוקטיילים ₪</label><input type="number" style={inp} value={cocktailUpgrade} onChange={e=>setCocktailUpgrade(e.target.value)} /></div>
              </div>
            </div>
          </div>
          <div style={{ padding: "20px 20px", borderBottom: `1px solid ${F.br}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: F.gold, marginBottom: 16 }}>בחירת מנות</div>
            {Object.entries(MENU_DB).map(([cat, items]) => (
              <div key={cat} style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#e8e2d8", marginBottom: 8, paddingBottom: 4, borderBottom: "1px solid rgba(200,169,110,0.15)" }}>{cat}</div>
                {[...items, ...customs.filter(c=>c.category===cat)].map(item => (
                  <div key={item.id} onClick={()=>tog(item.id)} style={{ display: "flex", gap: 10, padding: "7px 0", cursor: "pointer" }}>
                    <div style={{ width: 20, height: 20, borderRadius: 4, flexShrink: 0, marginTop: 1, display: "flex", alignItems: "center", justifyContent: "center", background: sel.has(item.id)?F.gold:F.bg, border: `1.5px solid ${sel.has(item.id)?F.gold:F.br}`, fontSize: 12, fontWeight: 700, color: F.bg }}>{sel.has(item.id) && "✓"}</div>
                    <div style={{flex:1}}><div style={{ fontSize: 13, fontWeight: 500 }}>{item.name}</div>{item.desc && <div style={{ fontSize: 10.5, color: F.dm, lineHeight: 1.5, marginTop: 2 }}>{item.desc}</div>}</div>
                  </div>
                ))}
                {showCF === cat ? (
                  <div style={{ marginTop: 8, padding: 12, background: F.bg, borderRadius: 6, border: `1px dashed ${F.br}` }}>
                    <input style={{ ...inp, background: F.sf, marginBottom: 8 }} value={cn} onChange={e=>setCn(e.target.value)} placeholder="שם המנה" />
                    <input style={{ ...inp, background: F.sf, marginBottom: 8 }} value={cd} onChange={e=>setCd(e.target.value)} placeholder="תיאור" />
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={()=>addC(cat)} style={{ flex: 1, padding: 8, borderRadius: 4, border: "none", background: F.gold, color: "#1e1e1e", fontFamily: FN.body, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>הוסף</button>
                      <button onClick={()=>setShowCF(null)} style={{ flex: 1, padding: 8, borderRadius: 4, border: "none", background: F.br, color: F.tx, fontFamily: FN.body, fontSize: 12, cursor: "pointer" }}>ביטול</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={()=>{setShowCF(cat);setCn("");setCd("");}} style={{ width: "100%", marginTop: 4, padding: 8, background: "none", border: `1px dashed ${F.br}`, borderRadius: 6, color: F.gold, fontFamily: FN.body, fontSize: 12, cursor: "pointer" }}>+ הוסף מנה מותאמת</button>
                )}
              </div>
            ))}
          </div>
          <div style={{ padding: "20px 20px" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: F.gold, marginBottom: 16 }}>שירותים</div>
            {services.map((s, i) => (
              <div key={i} style={{ marginBottom: 14, paddingBottom: 10, borderBottom: "1px solid rgba(100,100,100,0.3)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{s.name}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }} onClick={()=>uSvc(i,"included",!s.included)}>
                    <span style={{ fontSize: 11, color: F.dm }}>כלול</span>
                    <div style={{ width: 36, height: 20, borderRadius: 10, position: "relative", cursor: "pointer", background: s.included?F.gold:F.br, transition: "background 0.2s" }}>
                      <div style={{ width: 16, height: 16, borderRadius: "50%", background: "white", position: "absolute", top: 2, right: s.included?18:2, transition: "right 0.2s" }} />
                    </div>
                  </div>
                </div>
                {!s.included && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    <div><label style={{...lbl,fontSize:10}}>כמות</label><input type="number" style={{...inp,padding:"6px 8px",fontSize:12}} value={s.qty} onChange={e=>uSvc(i,"qty",e.target.value)} /></div>
                    <div><label style={{...lbl,fontSize:10}}>מחיר</label><input type="number" style={{...inp,padding:"6px 8px",fontSize:12}} value={s.price} onChange={e=>uSvc(i,"price",e.target.value)} /></div>
                  </div>
                )}
              </div>
            ))}
            <div style={{ background: F.bg, borderRadius: 8, padding: 16, marginTop: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 13 }}><span>אוכל ({guestCount} × {fmt(parseInt(pricePerGuest)||0)})</span><span>{fmt(foodT)} ₪</span></div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 13 }}><span>שירותים</span><span>{fmt(svcT)} ₪</span></div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 12, color: F.dm }}><span>סה"כ לפני מע"מ</span><span>{fmt(tot)} ₪</span></div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 0", fontSize: 15, fontWeight: 700, color: F.gold, borderTop: `1px solid ${F.br}`, marginTop: 6 }}><span>סה"כ כולל מע"מ</span><span>{fmt(totV)} ₪</span></div>
            </div>
          </div>
        </div>
      )}

      {tab === "preview" && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div style={{ display: "flex", background: F.sf, borderBottom: `1px solid ${F.br}` }}>
            {pages.map((n,i) => (
              <button key={i} onClick={()=>setPg(i)} style={{ flex: 1, padding: "10px 0", background: "none", border: "none", cursor: "pointer", fontFamily: FN.body, fontSize: 13, fontWeight: pg===i?700:400, color: pg===i?F.gold:F.dm, borderBottom: pg===i?`2px solid ${F.gold}`:"2px solid transparent" }}>{n}</button>
            ))}
          </div>
          <Preview>
            {pg === 0 && <MenuPage menuTitle={menuTitle} menuType={menuType} categories={byCat} supplementPrice={supplementPrice} />}
            {pg === 1 && <PricingPage clientName={clientName} eventType={eventType} eventDate={eventDate} eventTime={eventTime} guestCount={guestCount} pricePerGuest={pricePerGuest} menuTitle={menuTitle} menuType={menuType} services={services} cocktailUpgrade={cocktailUpgrade} foodTotal={foodT} totalBeforeVat={tot} totalWithVat={totV} servicePct={servicePct} />}
            {pg === 2 && <TermsPage validDays={validDays} menuType={menuType} />}
          </Preview>
        </div>
      )}

      {/* Hidden print area - always rendered, hidden on screen via CSS, shown only in print */}
      <div style={{ position: "sticky", bottom: 0, padding: "12px 20px", background: F.sf, borderTop: `1px solid ${F.br}`, zIndex: 20 }}>
        {tab === "form" ? (
          <button onClick={()=>setTab("preview")} style={{ width: "100%", background: F.gold, color: "#1e1e1e", border: "none", borderRadius: 8, padding: 13, fontFamily: FN.body, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>תצוגה מקדימה</button>
        ) : (
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={()=>setTab("form")} style={{ flex: 1, background: "none", color: F.gold, border: `1px solid ${F.gold}`, borderRadius: 8, padding: 13, fontFamily: FN.body, fontSize: 14, fontWeight: 500, cursor: "pointer" }}>← עריכה</button>
            <button onClick={handlePrint} disabled={pdfBusy} style={{ flex: 1, background: pdfBusy ? "#8a7560" : F.gold, color: "#1e1e1e", border: "none", borderRadius: 8, padding: 13, fontFamily: FN.body, fontSize: 14, fontWeight: 700, cursor: pdfBusy ? "wait" : "pointer", opacity: pdfBusy ? 0.7 : 1 }}>{pdfBusy ? "מייצר PDF..." : "שמור PDF"}</button>
          </div>
        )}
      </div>
      </div>{/* close app-ui */}

      <div id="print-area">
        <MenuPage menuTitle={menuTitle} menuType={menuType} categories={byCat} supplementPrice={supplementPrice} />
        <PricingPage clientName={clientName} eventType={eventType} eventDate={eventDate} eventTime={eventTime} guestCount={guestCount} pricePerGuest={pricePerGuest} menuTitle={menuTitle} menuType={menuType} services={services} cocktailUpgrade={cocktailUpgrade} foodTotal={foodT} totalBeforeVat={tot} totalWithVat={totV} servicePct={servicePct} />
        <TermsPage validDays={validDays} menuType={menuType} />
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
