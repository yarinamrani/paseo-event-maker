<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Paseo CRM - ניהול לידים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;500;600;700;800&family=Suez+One&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Heebo', sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #232323; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #777; }

    /* Top Nav */
    .top-nav { background: #232323; border-bottom: 1px solid #333; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .top-nav .logo { font-family: 'Suez One', serif; font-size: 22px; color: #c8a96e; letter-spacing: 1px; }
    .top-nav .logo span { color: #777; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 300; margin-right: 10px; }
    .top-nav .nav-links { display: flex; gap: 8px; }
    .top-nav .nav-links a { color: #999; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .top-nav .nav-links a:hover { color: #e0e0e0; background: #2d2d2d; }
    .top-nav .nav-links a.active { color: #c8a96e; background: rgba(200,169,110,0.1); }

    /* Layout */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* Dashboard Cards */
    .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #232323; border: 1px solid #333; border-radius: 12px; padding: 20px; transition: all 0.2s; }
    .stat-card:hover { border-color: #444; transform: translateY(-1px); }
    .stat-card .stat-label { font-size: 12px; color: #888; font-weight: 400; margin-bottom: 8px; }
    .stat-card .stat-value { font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
    .stat-card .stat-sub { font-size: 12px; color: #666; margin-top: 6px; }
    .stat-card.gold .stat-value { color: #c8a96e; }
    .stat-card.green .stat-value { color: #4ade80; }
    .stat-card.red .stat-value { color: #f87171; }
    .stat-card.blue .stat-value { color: #60a5fa; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; background: #232323; border: 1px solid #333; border-radius: 8px; padding: 10px 16px; color: #e0e0e0; font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-box:focus { border-color: #c8a96e; }
    .search-box::placeholder { color: #666; }

    .filter-btn { background: #232323; border: 1px solid #333; border-radius: 8px; padding: 8px 16px; color: #999; font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .filter-btn:hover { border-color: #555; color: #e0e0e0; }
    .filter-btn.active { border-color: #c8a96e; color: #c8a96e; background: rgba(200,169,110,0.08); }

    .btn-primary { background: #c8a96e; color: #1a1a1a; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-primary:hover { background: #d4b87a; }

    .btn-secondary { background: transparent; color: #c8a96e; border: 1px solid #c8a96e; border-radius: 8px; padding: 8px 16px; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { background: rgba(200,169,110,0.1); }

    .btn-danger { background: transparent; color: #f87171; border: 1px solid rgba(248,113,113,0.3); border-radius: 6px; padding: 6px 12px; font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }

    /* Table */
    .table-wrap { background: #232323; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
    .table-wrap table { width: 100%; border-collapse: collapse; }
    .table-wrap th { background: #2a2a2a; padding: 12px 16px; font-size: 12px; font-weight: 500; color: #888; text-align: right; border-bottom: 1px solid #333; white-space: nowrap; }
    .table-wrap td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #2d2d2d; vertical-align: middle; }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap tr:hover td { background: #2a2a2a; }
    .table-wrap tr { cursor: pointer; transition: background 0.15s; }

    .client-name { font-weight: 600; color: #fff; }
    .client-phone { font-size: 12px; color: #888; margin-top: 2px; direction: ltr; text-align: right; }
    .event-info { font-size: 13px; color: #bbb; }
    .event-date { font-size: 12px; color: #888; }
    .price-tag { font-weight: 600; color: #c8a96e; white-space: nowrap; }
    .source-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #2d2d2d; color: #999; display: inline-block; }

    /* Status Badges */
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .status .dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-new { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .status-new .dot { background: #60a5fa; }
    .status-sent { background: rgba(250,204,21,0.12); color: #facc15; }
    .status-sent .dot { background: #facc15; }
    .status-followup { background: rgba(251,146,60,0.12); color: #fb923c; }
    .status-followup .dot { background: #fb923c; }
    .status-closed { background: rgba(74,222,128,0.12); color: #4ade80; }
    .status-closed .dot { background: #4ade80; }
    .status-cancelled { background: rgba(248,113,113,0.12); color: #f87171; }
    .status-cancelled .dot { background: #f87171; }
    .status-irrelevant { background: rgba(120,120,120,0.12); color: #888; }
    .status-irrelevant .dot { background: #888; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal { background: #232323; border: 1px solid #444; border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #333; }
    .modal-header h2 { font-size: 18px; font-weight: 600; color: #fff; }
    .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; padding: 4px; line-height: 1; }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #333; display: flex; gap: 10px; justify-content: flex-start; }

    /* Form Fields */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; color: #888; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #c8a96e; }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-group select { cursor: pointer; }

    /* Follow-up indicator */
    .followup-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #fb923c; background: rgba(251,146,60,0.1); padding: 2px 8px; border-radius: 10px; }
    .followup-badge.overdue { color: #f87171; background: rgba(248,113,113,0.1); }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 15px; margin-bottom: 8px; }
    .empty-state .sub { font-size: 13px; color: #555; }

    /* Responsive */
    @media (max-width: 768px) {
      .container { padding: 16px; }
      .dashboard { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-card .stat-value { font-size: 24px; }
      .toolbar { gap: 8px; }
      .form-grid { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
      .table-wrap table { min-width: 700px; }
      .top-nav { padding: 10px 16px; }
      .top-nav .nav-links a { padding: 6px 10px; font-size: 12px; }
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal { animation: slideUp 0.25s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ====== CONSTANTS ======
    const STATUSES = [
      { key: "new", label: "ליד חדש", class: "status-new" },
      { key: "sent", label: "נשלחה הצעה", class: "status-sent" },
      { key: "followup", label: "במעקב", class: "status-followup" },
      { key: "closed", label: "נסגר", class: "status-closed" },
      { key: "cancelled", label: "התבטל", class: "status-cancelled" },
      { key: "irrelevant", label: "לא רלוונטי", class: "status-irrelevant" },
    ];

    const EVENT_TYPES = ["חתונה", "יום הולדת", "בר/בת מצווה", "אירוע חברה", "ברית/הברית", "אירוע פרטי", "אחר"];
    const SOURCES = ["אינסטגרם", "המלצה", "גוגל", "פייסבוק", "אתר", "טלפון", "אחר"];
    const CANCEL_REASONS = ["מחיר גבוה", "בחרו מתחרה", "ביטול האירוע", "תאריך לא פנוי", "לא חזרו", "אחר"];

    // ====== STORAGE ======
    const STORAGE_KEY = "paseo_crm_leads";
    const loadLeads = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    };
    const saveLeads = (leads) => localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));

    // ====== HELPERS ======
    const genId = () => "L" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    const fmt = (n) => Number(n || 0).toLocaleString("he-IL");
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString("he-IL") : "—";
    const isOverdue = (d) => d && new Date(d) < new Date(new Date().toDateString());
    const daysDiff = (d) => {
      if (!d) return null;
      const diff = Math.ceil((new Date(d) - new Date(new Date().toDateString())) / 86400000);
      return diff;
    };

    const emptyLead = () => ({
      id: genId(),
      clientName: "",
      clientPhone: "",
      clientEmail: "",
      eventType: "",
      eventDate: "",
      guestCount: "",
      pricePerGuest: "",
      source: "",
      status: "new",
      cancelReason: "",
      notes: "",
      followUpDate: "",
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });

    // ====== STATUS BADGE ======
    function StatusBadge({ status }) {
      const s = STATUSES.find(x => x.key === status) || STATUSES[0];
      return <span className={`status ${s.class}`}><span className="dot"></span>{s.label}</span>;
    }

    // ====== LEAD MODAL ======
    function LeadModal({ lead, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ ...lead });
      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
      const isNew = !lead.clientName;

      const handleSave = () => {
        if (!form.clientName.trim()) { alert("נא להזין שם לקוח"); return; }
        onSave({ ...form, updatedAt: new Date().toISOString() });
      };

      return (
        <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <h2>{isNew ? "ליד חדש" : `עריכת ליד — ${form.clientName}`}</h2>
              <button className="modal-close" onClick={onClose}>&times;</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group">
                  <label>שם הלקוח *</label>
                  <input value={form.clientName} onChange={e => set("clientName", e.target.value)} placeholder="שם מלא" autoFocus />
                </div>
                <div className="form-group">
                  <label>טלפון</label>
                  <input value={form.clientPhone} onChange={e => set("clientPhone", e.target.value)} placeholder="050-0000000" type="tel" dir="ltr" style={{textAlign:"right"}} />
                </div>
                <div className="form-group">
                  <label>אימייל</label>
                  <input value={form.clientEmail} onChange={e => set("clientEmail", e.target.value)} placeholder="email@example.com" type="email" dir="ltr" style={{textAlign:"right"}} />
                </div>
                <div className="form-group">
                  <label>סוג אירוע</label>
                  <select value={form.eventType} onChange={e => set("eventType", e.target.value)}>
                    <option value="">בחר סוג</option>
                    {EVENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>תאריך אירוע</label>
                  <input value={form.eventDate} onChange={e => set("eventDate", e.target.value)} type="date" />
                </div>
                <div className="form-group">
                  <label>כמות אורחים</label>
                  <input value={form.guestCount} onChange={e => set("guestCount", e.target.value)} type="number" placeholder="100" />
                </div>
                <div className="form-group">
                  <label>מחיר לאורח (₪)</label>
                  <input value={form.pricePerGuest} onChange={e => set("pricePerGuest", e.target.value)} type="number" placeholder="350" />
                </div>
                <div className="form-group">
                  <label>מקור הפנייה</label>
                  <select value={form.source} onChange={e => set("source", e.target.value)}>
                    <option value="">בחר מקור</option>
                    {SOURCES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>סטטוס</label>
                  <select value={form.status} onChange={e => set("status", e.target.value)}>
                    {STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>תאריך מעקב הבא</label>
                  <input value={form.followUpDate} onChange={e => set("followUpDate", e.target.value)} type="date" />
                </div>
                {form.status === "cancelled" && (
                  <div className="form-group">
                    <label>סיבת ביטול</label>
                    <select value={form.cancelReason} onChange={e => set("cancelReason", e.target.value)}>
                      <option value="">בחר סיבה</option>
                      {CANCEL_REASONS.map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>
                )}
                <div className="form-group full">
                  <label>הערות</label>
                  <textarea value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="הערות חופשיות..." />
                </div>
              </div>

              {form.guestCount && form.pricePerGuest && (
                <div style={{ marginTop: 20, padding: "14px 18px", background: "#1a1a1a", borderRadius: 10, border: "1px solid #333" }}>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>סכום משוער</div>
                  <div style={{ fontSize: 26, fontWeight: 700, color: "#c8a96e" }}>₪{fmt(Number(form.guestCount) * Number(form.pricePerGuest))}</div>
                  <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>{form.guestCount} אורחים × ₪{fmt(Number(form.pricePerGuest))} לפני מע״מ ושירותים</div>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn-primary" onClick={handleSave}>{isNew ? "צור ליד" : "שמור שינויים"}</button>
              {!isNew && form.guestCount && form.pricePerGuest && (
                <a href={`index.html?client=${encodeURIComponent(form.clientName)}&guests=${form.guestCount}&price=${form.pricePerGuest}&event=${encodeURIComponent(form.eventType)}&date=${form.eventDate}`}
                   target="_blank" className="btn-secondary" style={{textDecoration:"none", display:"inline-flex", alignItems:"center"}}>
                  צור הצעת מחיר
                </a>
              )}
              {!isNew && (
                <button className="btn-danger" onClick={() => { if (confirm("למחוק את הליד?")) onDelete(form.id); }} style={{marginRight:"auto"}}>מחק</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ====== MAIN APP ======
    function App() {
      const [leads, setLeads] = useState(loadLeads);
      const [search, setSearch] = useState("");
      const [filterStatus, setFilterStatus] = useState("all");
      const [modal, setModal] = useState(null); // null or lead object
      const [sortField, setSortField] = useState("updatedAt");
      const [sortDir, setSortDir] = useState("desc");

      // Persist
      useEffect(() => { saveLeads(leads); }, [leads]);

      // Stats
      const stats = useMemo(() => {
        const thisMonth = new Date(); thisMonth.setDate(1); thisMonth.setHours(0,0,0,0);
        const monthLeads = leads.filter(l => new Date(l.createdAt) >= thisMonth);
        const total = leads.length;
        const closed = leads.filter(l => l.status === "closed").length;
        const sent = leads.filter(l => l.status === "sent" || l.status === "followup").length;
        const cancelled = leads.filter(l => l.status === "cancelled").length;
        const monthNew = monthLeads.length;
        const monthClosed = monthLeads.filter(l => l.status === "closed").length;
        const revenue = leads.filter(l => l.status === "closed").reduce((s, l) => s + (Number(l.guestCount)||0) * (Number(l.pricePerGuest)||0), 0);
        const convRate = total > 0 ? Math.round((closed / total) * 100) : 0;
        const overdueFollowups = leads.filter(l => l.followUpDate && isOverdue(l.followUpDate) && !["closed","cancelled","irrelevant"].includes(l.status)).length;
        return { total, closed, sent, cancelled, monthNew, monthClosed, revenue, convRate, overdueFollowups };
      }, [leads]);

      // Filtered & sorted
      const filtered = useMemo(() => {
        let list = [...leads];
        if (filterStatus !== "all") list = list.filter(l => l.status === filterStatus);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          list = list.filter(l =>
            l.clientName.toLowerCase().includes(q) ||
            l.clientPhone.includes(q) ||
            l.clientEmail.toLowerCase().includes(q) ||
            l.eventType.includes(q) ||
            l.source.includes(q)
          );
        }
        list.sort((a, b) => {
          let va = a[sortField] || "", vb = b[sortField] || "";
          if (sortField === "guestCount" || sortField === "pricePerGuest") { va = Number(va)||0; vb = Number(vb)||0; }
          if (va < vb) return sortDir === "asc" ? -1 : 1;
          if (va > vb) return sortDir === "asc" ? 1 : -1;
          return 0;
        });
        return list;
      }, [leads, filterStatus, search, sortField, sortDir]);

      const handleSave = useCallback((lead) => {
        setLeads(prev => {
          const idx = prev.findIndex(l => l.id === lead.id);
          if (idx >= 0) { const n = [...prev]; n[idx] = lead; return n; }
          return [lead, ...prev];
        });
        setModal(null);
      }, []);

      const handleDelete = useCallback((id) => {
        setLeads(prev => prev.filter(l => l.id !== id));
        setModal(null);
      }, []);

      const toggleSort = (field) => {
        if (sortField === field) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortField(field); setSortDir("desc"); }
      };

      const sortIcon = (field) => {
        if (sortField !== field) return "";
        return sortDir === "asc" ? " ↑" : " ↓";
      };

      return (
        <>
          {/* NAV */}
          <nav className="top-nav">
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="logo">PASEO <span>CRM</span></div>
            </div>
            <div className="nav-links">
              <a href="crm.html" className="active">לידים</a>
              <a href="index.html">הצעות מחיר</a>
            </div>
          </nav>

          <div className="container fade-in">
            {/* DASHBOARD */}
            <div className="dashboard">
              <div className="stat-card blue">
                <div className="stat-label">סה״כ לידים</div>
                <div className="stat-value">{stats.total}</div>
                <div className="stat-sub">{stats.monthNew} החודש</div>
              </div>
              <div className="stat-card gold">
                <div className="stat-label">ממתינים לתשובה</div>
                <div className="stat-value">{stats.sent}</div>
                {stats.overdueFollowups > 0 && <div className="stat-sub" style={{color:"#f87171"}}>{stats.overdueFollowups} באיחור מעקב</div>}
              </div>
              <div className="stat-card green">
                <div className="stat-label">נסגרו</div>
                <div className="stat-value">{stats.closed}</div>
                <div className="stat-sub">₪{fmt(stats.revenue)} הכנסה</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">אחוז המרה</div>
                <div className="stat-value" style={{color: stats.convRate >= 30 ? "#4ade80" : stats.convRate >= 15 ? "#facc15" : "#f87171"}}>{stats.convRate}%</div>
                <div className="stat-sub">{stats.cancelled} התבטלו</div>
              </div>
            </div>

            {/* TOOLBAR */}
            <div className="toolbar">
              <input className="search-box" placeholder="חיפוש לפי שם, טלפון, סוג אירוע..." value={search} onChange={e => setSearch(e.target.value)} />
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button className={`filter-btn ${filterStatus === "all" ? "active" : ""}`} onClick={() => setFilterStatus("all")}>הכל ({leads.length})</button>
                {STATUSES.map(s => {
                  const count = leads.filter(l => l.status === s.key).length;
                  if (count === 0) return null;
                  return <button key={s.key} className={`filter-btn ${filterStatus === s.key ? "active" : ""}`} onClick={() => setFilterStatus(s.key)}>{s.label} ({count})</button>;
                })}
              </div>
              <button className="btn-primary" onClick={() => setModal(emptyLead())}>+ ליד חדש</button>
            </div>

            {/* TABLE */}
            {filtered.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">📋</div>
                <p>{leads.length === 0 ? "אין לידים עדיין" : "אין תוצאות לחיפוש"}</p>
                <div className="sub">{leads.length === 0 ? "לחץ על \"+ ליד חדש\" כדי להתחיל" : "נסה לשנות את מסנני החיפוש"}</div>
              </div>
            ) : (
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th style={{cursor:"pointer"}} onClick={() => toggleSort("clientName")}>לקוח{sortIcon("clientName")}</th>
                      <th style={{cursor:"pointer"}} onClick={() => toggleSort("eventType")}>אירוע{sortIcon("eventType")}</th>
                      <th style={{cursor:"pointer"}} onClick={() => toggleSort("eventDate")}>תאריך{sortIcon("eventDate")}</th>
                      <th style={{cursor:"pointer"}} onClick={() => toggleSort("guestCount")}>אורחים{sortIcon("guestCount")}</th>
                      <th>סכום משוער</th>
                      <th>מקור</th>
                      <th style={{cursor:"pointer"}} onClick={() => toggleSort("status")}>סטטוס{sortIcon("status")}</th>
                      <th>מעקב</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(lead => {
                      const total = (Number(lead.guestCount)||0) * (Number(lead.pricePerGuest)||0);
                      const dd = daysDiff(lead.followUpDate);
                      const overdue = lead.followUpDate && isOverdue(lead.followUpDate) && !["closed","cancelled","irrelevant"].includes(lead.status);
                      return (
                        <tr key={lead.id} onClick={() => setModal({...lead})}>
                          <td>
                            <div className="client-name">{lead.clientName}</div>
                            {lead.clientPhone && <div className="client-phone">{lead.clientPhone}</div>}
                          </td>
                          <td className="event-info">{lead.eventType || "—"}</td>
                          <td className="event-date">{fmtDate(lead.eventDate)}</td>
                          <td>{lead.guestCount || "—"}</td>
                          <td className="price-tag">{total > 0 ? `₪${fmt(total)}` : "—"}</td>
                          <td>{lead.source ? <span className="source-tag">{lead.source}</span> : "—"}</td>
                          <td><StatusBadge status={lead.status} /></td>
                          <td>
                            {lead.followUpDate ? (
                              <span className={`followup-badge ${overdue ? "overdue" : ""}`}>
                                {overdue ? `באיחור ${Math.abs(dd)} ימים` : dd === 0 ? "היום" : `בעוד ${dd} ימים`}
                              </span>
                            ) : "—"}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* MODAL */}
          {modal && <LeadModal lead={modal} onSave={handleSave} onDelete={handleDelete} onClose={() => setModal(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
